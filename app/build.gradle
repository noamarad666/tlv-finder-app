plugins {
    id 'com.android.application'
}

android {
    compileSdk 34
    namespace 'com.tlvfinder'

    defaultConfig {
        applicationId "com.tlvfinder"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
        buildConfigField "String", "CLAUDE_API_KEY", "\"${System.getenv('CLAUDE_API_KEY') ?: ''}\""
    }

    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.debug
        }
    }

    buildFeatures {
        buildConfig true
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
